name: Build DawellService

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dawellservice.exe
            asset_name: dawellservice-windows.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: dawellservice
            asset_name: dawellservice-macos
            universal: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: dawellservice
            asset_name: dawellservice-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add ARM64 target (macOS universal binary)
        if: matrix.universal == true
        run: rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build ARM64 (macOS universal binary)
        if: matrix.universal == true
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create macOS universal binary
        if: matrix.universal == true
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/dawellservice \
            target/aarch64-apple-darwin/release/dawellservice \
            -output target/dawellservice
          lipo -info target/dawellservice

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact (macOS universal)
        if: matrix.universal == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/dawellservice

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
