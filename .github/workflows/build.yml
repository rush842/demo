name: Build DawellService

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: dawellservice.exe
            asset_name: dawellservice-windows.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: dawellservice
            asset_name: dawellservice-macos
            universal: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: dawellservice
            asset_name: dawellservice-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add ARM64 target (macOS universal binary)
        if: matrix.universal == true
        run: rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxtst-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build ARM64 (macOS universal binary)
        if: matrix.universal == true
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create macOS universal binary
        if: matrix.universal == true
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/dawellservice \
            target/aarch64-apple-darwin/release/dawellservice \
            -output target/dawellservice
          lipo -info target/dawellservice

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact (macOS universal)
        if: matrix.universal == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/dawellservice

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release (latest)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-windows.exe
          path: dist/windows/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-macos
          path: dist/macos/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-linux
          path: dist/linux/

      - name: Rename binaries for release
        run: |
          mv dist/windows/dawellservice.exe dist/dawellservice-windows.exe
          mv dist/macos/dawellservice        dist/dawellservice-macos
          mv dist/linux/dawellservice        dist/dawellservice-linux
          chmod +x dist/dawellservice-macos dist/dawellservice-linux

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build #${{ github.run_number }}"
          body: "Automated build · commit ${{ github.sha }}"
          make_latest: true
          files: |
            dist/dawellservice-windows.exe
            dist/dawellservice-macos
            dist/dawellservice-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
