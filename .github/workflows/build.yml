name: Build DawellService Mac

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  DAWELLSERVICE_API_BASE_URL: ${{ secrets.DAWELLSERVICE_API_BASE_URL || 'http://192.168.1.40:4000/api/client' }}
  DAWELLSERVICE_WS_URL: ${{ secrets.DAWELLSERVICE_WS_URL || 'ws://192.168.1.40:4000/ws' }}

jobs:
  build-macos:
    name: macOS Universal (Apple Silicon + Intel)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Universal Binary (ARM64 + x86_64)
        run: |
          swift build -c release --arch arm64 --arch x86_64 \
            -Xswiftc -DDAWELLSERVICE_API_BASE_URL="$DAWELLSERVICE_API_BASE_URL" \
            -Xswiftc -DDAWELLSERVICE_WS_URL="$DAWELLSERVICE_WS_URL"

      - name: Create App Bundle
        run: |
          BINARY=".build/apple/Products/Release/DawellService"
          APP="DawellService.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp "$BINARY" "$APP/Contents/MacOS/dawellservice"
          cp Info.plist "$APP/Contents/Info.plist"
          chmod +x "$APP/Contents/MacOS/dawellservice"

          # Remove quarantine + ad-hoc sign the bundle
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"

          echo "App bundle created:"
          file "$APP/Contents/MacOS/dawellservice"

      - name: Also copy raw binary
        run: |
          cp ".build/apple/Products/Release/DawellService" dawellservice
          chmod +x dawellservice
          xattr -cr dawellservice
          codesign --force --sign - dawellservice

      - name: Package as DMG
        run: |
          mkdir -p dmg_stage
          cp -r DawellService.app dmg_stage/
          hdiutil create \
            -volname "DawellService" \
            -srcfolder dmg_stage \
            -ov \
            -format UDZO \
            dawellservice.dmg

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawellservice-macos-app
          path: DawellService.app

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawellservice-macos-dmg
          path: dawellservice.dmg

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawellservice-macos-bin
          path: dawellservice

  release:
    name: Create Release
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-macos-dmg
          path: dist/

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-macos-bin
          path: dist/

      - name: Rename binary
        run: mv dist/dawellservice dist/dawellservice-mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dawellservice.dmg
            dist/dawellservice-mac
          generate_release_notes: true
