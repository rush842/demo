name: Build DawellService

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  DAWELLSERVICE_API_BASE_URL: ${{ secrets.DAWELLSERVICE_API_BASE_URL }}
  DAWELLSERVICE_WS_URL: ${{ secrets.DAWELLSERVICE_WS_URL }}

jobs:
  # ─────────────────────────────────────────
  # Windows → dawellservice.exe
  # ─────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary
        run: |
          copy target\x86_64-pc-windows-msvc\release\dawellservice.exe dawellservice.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawellservice-windows
          path: dawellservice.exe

  # ─────────────────────────────────────────
  # macOS → dawellservice.dmg
  # ─────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64 (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary (fat binary)
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/dawellservice \
            target/aarch64-apple-darwin/release/dawellservice \
            -output dawellservice-universal

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - dawellservice-universal

      - name: Package as .dmg
        run: |
          mkdir -p dmg_stage
          cp dawellservice-universal dmg_stage/dawellservice
          chmod +x dmg_stage/dawellservice
          hdiutil create \
            -volname "DawellService" \
            -srcfolder dmg_stage \
            -ov \
            -format UDZO \
            dawellservice.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawellservice-macos
          path: dawellservice.dmg

  # ─────────────────────────────────────────
  # Release — attach Windows + macOS artifacts
  # ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-windows
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: dawellservice-macos
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dawellservice.exe
            dist/dawellservice.dmg
          generate_release_notes: true
